name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  ContinuousIntegrationBuild: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  verify:
    name: Windows verification
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pinned .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', '**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Require PowerShell 7
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion.Major -lt 7) {
              throw "PowerShell 7 or later is required; selected $($PSVersionTable.PSVersion)."
          }

      - name: Verify
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File scripts/verify.ps1
          if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
          }

      - name: Upload verification artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: verification-artifacts
          path: |
            artifacts/test-results/
            artifacts/dependency-audit/
            artifacts/publish/startup.*.log
          if-no-files-found: warn
          retention-days: 14
