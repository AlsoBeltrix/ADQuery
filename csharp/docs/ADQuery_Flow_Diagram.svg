<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 950" width="800" height="950">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f57c00"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="950" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="bold" fill="#333">ADQuery Request Flow</text>

  <!-- User Box -->
  <rect x="250" y="55" width="300" height="60" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#1565c0">USER (Browser)</text>
  <text x="400" y="100" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#666">"Show me all contractors in Finance"</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="115" x2="400" y2="140" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- On-Premises Zone 1 -->
  <rect x="50" y="145" width="700" height="200" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="70" y="170" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#2e7d32">🔒 ON-PREMISES (Internal Network)</text>

  <!-- Step 1 -->
  <rect x="250" y="185" width="300" height="50" rx="6" fill="white" stroke="#1976d2" stroke-width="2"/>
  <circle cx="255" cy="210" r="12" fill="#1976d2"/>
  <text x="255" y="214" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="white">1</text>
  <text x="400" y="205" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#1976d2">Windows Authentication</text>
  <text x="400" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">User identity verified (Kerberos/NTLM)</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="235" x2="400" y2="255" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <rect x="250" y="260" width="300" height="50" rx="6" fill="white" stroke="#1976d2" stroke-width="2"/>
  <circle cx="255" cy="285" r="12" fill="#1976d2"/>
  <text x="255" y="289" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="white">2</text>
  <text x="400" y="280" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#1976d2">Build LLM Prompt</text>
  <text x="400" y="297" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">Add schema context, mappings, allowed attributes</text>

  <!-- Data note -->
  <rect x="200" y="315" width="400" height="25" rx="4" fill="#c8e6c9" stroke="#4caf50" stroke-width="1"/>
  <text x="400" y="332" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#2e7d32">✓ Sent: Query text, headers, patterns | ✗ NOT sent: User data, CUI, PII</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="345" x2="400" y2="370" stroke="#f57c00" stroke-width="2" marker-end="url(#arrowhead-orange)"/>

  <!-- External Zone -->
  <rect x="50" y="375" width="700" height="130" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="70" y="400" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#e65100">🌐 EXTERNAL (Internet) — HTTPS Only</text>

  <!-- Step 3 -->
  <rect x="100" y="415" width="180" height="45" rx="6" fill="white" stroke="#f57c00" stroke-width="2"/>
  <circle cx="105" cy="437" r="12" fill="#f57c00"/>
  <text x="105" y="441" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="white">3</text>
  <text x="195" y="432" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#f57c00">Send to LLM API</text>
  <text x="195" y="448" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#666">Query + context only</text>

  <!-- Arrow to LLM -->
  <line x1="280" y1="437" x2="330" y2="437" stroke="#f57c00" stroke-width="2" marker-end="url(#arrowhead-orange)"/>

  <!-- LLM Box -->
  <rect x="335" y="415" width="130" height="45" rx="6" fill="#fff8e1" stroke="#f57c00" stroke-width="2"/>
  <text x="400" y="435" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#f57c00">LLM API</text>
  <text x="400" y="452" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#666">Generates JSON plan</text>

  <!-- Arrow from LLM -->
  <line x1="465" y1="437" x2="515" y2="437" stroke="#f57c00" stroke-width="2" marker-end="url(#arrowhead-orange)"/>

  <!-- Step 4 -->
  <rect x="520" y="415" width="180" height="45" rx="6" fill="white" stroke="#f57c00" stroke-width="2"/>
  <circle cx="525" cy="437" r="12" fill="#f57c00"/>
  <text x="525" y="441" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="white">4</text>
  <text x="615" y="432" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#f57c00">Receive JSON Plan</text>
  <text x="615" y="448" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#666">Declarative structure</text>

  <!-- Warning note -->
  <rect x="200" y="468" width="400" height="25" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
  <text x="400" y="485" text-anchor="middle" font-family="Segoe UI, Arial" font-size="10" fill="#e65100">LLM returns declarative JSON — NOT executable code</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="505" x2="400" y2="530" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- On-Premises Zone 2 -->
  <rect x="50" y="535" width="700" height="280" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="70" y="560" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#2e7d32">🔒 ON-PREMISES (Internal Network)</text>

  <!-- Step 5 - Security Gate -->
  <rect x="220" y="575" width="360" height="80" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <circle cx="225" cy="615" r="12" fill="#c62828"/>
  <text x="225" y="619" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="white">5</text>
  <text x="400" y="595" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#c62828">Plan Validation (Security Gate)</text>
  <text x="400" y="615" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">✓ Attributes on allowlist?  ✓ Complexity within limits?</text>
  <text x="400" y="632" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">✓ Valid operations only?</text>
  <text x="400" y="648" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#c62828">REJECT if any check fails</text>

  <!-- Arrow 5 -->
  <line x1="400" y1="655" x2="400" y2="680" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 6 -->
  <rect x="250" y="685" width="300" height="50" rx="6" fill="white" stroke="#1976d2" stroke-width="2"/>
  <circle cx="255" cy="710" r="12" fill="#1976d2"/>
  <text x="255" y="714" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="white">6</text>
  <text x="400" y="705" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#1976d2">Execute Against AD</text>
  <text x="400" y="722" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">Translate to LDAP queries (values escaped)</text>

  <!-- Arrow 6 -->
  <line x1="400" y1="735" x2="400" y2="760" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 7 -->
  <rect x="250" y="765" width="300" height="50" rx="6" fill="white" stroke="#1976d2" stroke-width="2"/>
  <circle cx="255" cy="790" r="12" fill="#1976d2"/>
  <text x="255" y="794" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="white">7</text>
  <text x="400" y="785" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#1976d2">Process Results</text>
  <text x="400" y="802" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">Format output, save to file share, write audit log</text>

  <!-- Arrow 7 -->
  <line x1="400" y1="815" x2="400" y2="850" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Response Box -->
  <rect x="250" y="855" width="300" height="55" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="400" y="878" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#1565c0">RESPONSE TO USER</text>
  <text x="400" y="898" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#666">Data preview + download link + audit logged</text>

  <!-- Legend -->
  <rect x="150" y="920" width="20" height="14" rx="3" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="175" y="931" font-family="Segoe UI, Arial" font-size="10" fill="#333">On-Premises</text>
  <rect x="290" y="920" width="20" height="14" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="315" y="931" font-family="Segoe UI, Arial" font-size="10" fill="#333">External (no data)</text>
  <rect x="450" y="920" width="20" height="14" rx="3" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="475" y="931" font-family="Segoe UI, Arial" font-size="10" fill="#333">Security Validation</text>
</svg>